<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes candidatures - Recherche d'emploi</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div>
        <h1>Mes candidatures</h1>
        <p class="subtitle">Suivi de tes candidatures</p>
      </div>
      <nav class="app-nav">
        <a href="index.html" class="nav-link">Offres</a>
        <a href="candidatures.html" class="nav-link active">Mes candidatures</a>
      </nav>
    </div>
  </header>

  <main class="board-wrap">
    <form id="add-form" class="add-form" autocomplete="off">
      <input type="text" id="add-title" placeholder="Intitulé du poste *" required />
      <input type="text" id="add-company" placeholder="Entreprise" />
      <input type="url" id="add-link" placeholder="Lien (https://...)" />
      <button type="submit" class="add-btn">Ajouter</button>
    </form>

    <p id="board-hint" class="board-hint">
      Astuce : ajoute des offres depuis l'onglet <strong>Offres</strong> (bouton « Suivre »),
      ou saisis-en une ci-dessus. Glisse les cartes d'une colonne à l'autre.
    </p>

    <div id="board" class="board"></div>
  </main>

  <script src="store.js"></script>
  <script src="candidatures.js"></script>
</body>
</html>
